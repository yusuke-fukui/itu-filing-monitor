# NGSO（非静止軌道）ファイリング状態調査
label: "NGSO調査"

# 対象国（ITUコード ※ISO 3166と異なる場合あり）
# 日本=J、ドイツ=D、スペイン=E、フランス=F、英国=G、イタリア=I、スウェーデン=S
# コメントを外して国を指定する。全行コメントのままなら全国対象。
# adm:
#   - J      # 日本
#   - CHN    # 中国
#   - USA    # 米国
#   - RUS    # ロシア
#   - G      # 英国
#   - LUX    # ルクセンブルク
adm:
  - J
  - CHN
  - USA
  - RUS
  - G
  - LUX

orbit:
  geo: false
  ngso: true

# 周波数フィルタ（MHz単位）
# 例：IMT帯 → freq_min: 694,   freq_max: 2700
# 例：Ka帯  → freq_min: 17300, freq_max: 30000
# 例：V帯   → freq_min: 37500, freq_max: 52400
freq_min: null
freq_max: null

proc:
  api: true
  coord: true
  notification: true

latest_brific: true
output: "results/survey_{label}_{date}.xlsx"
